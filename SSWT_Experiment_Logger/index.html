<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSWT 실험 로거</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>🌬️ SSWT 실험 로거 <span class="version-tag">ver 1.0.2</span></h1>
            <div class="header-actions">
                <button onclick="createNewExperimentFromUI()" class="btn-secondary">➕ 새 실험</button>
                <button onclick="showExperimentList()" class="btn-secondary">📋 실험 목록</button>
                <button onclick="exportToExcel()" class="btn-secondary">📥 엑셀보내기</button>
                <button onclick="document.getElementById('excel-import').click()" class="btn-secondary">📤 엑셀 불러오기</button>
                <input type="file" id="excel-import" accept=".xlsx,.xls" style="display:none" onchange="importFromExcel(event)">
            </div>
        </header>

        <nav class="nav-tabs">
            <button class="tab-btn active" data-tab="experiment" onclick="switchTab('experiment')">🛡️ 실험 전 &amp; 체크리스트</button>
            <button class="tab-btn tab-disabled" disabled title="추후 구현 예정">🔬 데이터 후처리</button>
            <button class="tab-btn tab-disabled" disabled title="추후 구현 예정">🧮 유동조건 계산</button>
        </nav>

        <main class="main-content">
            <div id="tab-experiment" class="tab-content active">
                <div class="page-header">
                    <div>
                        <h2>🛡️ 초음속 풍동 — 실험 전 입력 &amp; 가동 체크리스트</h2>
                        <p class="page-subtitle">Rev.0 / 운전 전 확인용 — 입력 후 순서대로 체크</p>
                    </div>
                    <div class="header-btn-group">
                        <button onclick="printSafetyChecklist()" class="btn-secondary">🖨️ 인쇄</button>
                        <button onclick="resetSafetyChecklist()" class="btn-secondary">🔄 체크 초기화</button>
                        <button onclick="saveExperimentData()" class="btn-primary">💾 저장</button>
                    </div>
                </div>

                <div class="form-section">
                    <div class="checklist-progress-wrap">
                        <div class="checklist-progress-bar-bg">
                            <div class="checklist-progress-bar-fill" id="checklist-progress-bar"></div>
                        </div>
                        <span class="checklist-progress-text" id="checklist-progress-text">0 / 25 항목 완료 (0%)</span>
                    </div>

                    <!-- ① 체크리스트 시작 전 입력 -->
                    <div class="inline-input-block pre-check-block">
                        <div class="inline-input-block-header">
                            <span class="inline-step-badge">입력</span>
                            <strong>체크리스트 시작 전 — 실험 정보 입력</strong>
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>exp#</label>
                                <input type="text" id="exp-number" readonly>
                            </div>
                            <div class="form-group">
                                <label>name (시험자)</label>
                                <input type="text" id="exp-name" placeholder="예: 홍길동">
                            </div>
                            <div class="form-group">
                                <label>date</label>
                                <input type="date" id="exp-date">
                            </div>
                            <div class="form-group">
                                <label>test model</label>
                                <input type="text" id="test-model" placeholder="예: NACA0012">
                            </div>
                            <div class="form-group">
                                <label>Objective</label>
                                <input type="text" id="objective" placeholder="예: Mach 2.0 flow visualization">
                            </div>
                            <div class="form-group">
                                <label>Mach #</label>
                                <input type="number" id="target-mach" step="0.01" placeholder="예: 2.0">
                            </div>
                            <div class="form-group">
                                <label>air pressure [hpa]</label>
                                <input type="number" id="air-pressure" step="0.1" placeholder="예: 1013.2">
                            </div>
                            <div class="form-group">
                                <label>air temperature [°C]</label>
                                <input type="number" id="air-temp" step="0.1" placeholder="예: 25.0">
                            </div>
                            <div class="form-group">
                                <label>air humidity [%]</label>
                                <input type="number" id="air-humidity" step="0.1" placeholder="예: 50.0">
                            </div>
                            <div class="form-group">
                                <label>Schlieren method</label>
                                <input type="text" id="schlieren-method" placeholder="예: Z-type Schlieren">
                            </div>
                            <div class="form-group">
                                <label>Schlieren target</label>
                                <input type="text" id="schlieren-target" placeholder="예: model surface">
                            </div>
                            <div class="form-group">
                                <label>camera</label>
                                <input type="text" id="camera-model" placeholder="예: Phantom TMX7510">
                            </div>
                            <div class="form-group">
                                <label>FPS [Hz]</label>
                                <input type="number" id="camera-fps" step="1000" placeholder="예: 500000">
                            </div>
                            <div class="form-group">
                                <label>W [px]</label>
                                <input type="number" id="camera-width" placeholder="예: 1280">
                            </div>
                            <div class="form-group">
                                <label>H [px]</label>
                                <input type="number" id="camera-height" placeholder="예: 800">
                            </div>
                            <div class="form-group">
                                <label>lens focal length [mm]</label>
                                <input type="text" id="lens-focal" placeholder="예: 200">
                            </div>
                            <div class="form-group">
                                <label>Expose time [μs]</label>
                                <input type="number" id="expose-time" step="0.01" placeholder="예: 1.0">
                            </div>
                            <div class="form-group">
                                <label>Expose index</label>
                                <input type="number" id="expose-index" step="1" placeholder="예: 1">
                            </div>
                        </div>
                    </div>

                    <!-- 체크리스트 (중간 입력은 JS에서 삽입) -->
                    <table class="checklist-table" id="checklist-table">
                        <thead>
                            <tr>
                                <th style="width:60px">체크</th>
                                <th>점검/조작 항목</th>
                                <th style="width:100px">단계</th>
                            </tr>
                        </thead>
                        <tbody id="checklist-tbody"></tbody>
                    </table>

                    <div class="form-group" style="margin-top:20px;">
                        <label>비고 / 이상사항</label>
                        <textarea id="checklist-notes" rows="3" placeholder="이상사항이 있으면 기록하세요"></textarea>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 실험 목록 모달 -->
    <div id="experiment-list-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📋 실험 목록</h2>
                <button onclick="closeExperimentList()" class="modal-close">✕</button>
            </div>
            <input type="text" id="search-experiments" placeholder="검색..." oninput="filterExperiments()"
                   style="width:100%;margin-bottom:16px;padding:10px;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:6px;color:var(--text-primary);">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>날짜</th>
                            <th>시험자</th>
                            <th>모델</th>
                            <th>Mach</th>
                            <th>상태</th>
                            <th>체크</th>
                            <th>작업</th>
                        </tr>
                    </thead>
                    <tbody id="experiments-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script src="excel-handler.js"></script>
    <script src="app.js"></script>
</body>
</html>
